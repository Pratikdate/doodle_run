<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | doodle_fight</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <style>
      #firebase-login {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: Arial, sans-serif;
      }
      #firebase-login button {
        background: #1a73e8;
        color: #fff;
        border: 0;
        padding: 8px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      #firebase-user {
        color: #fff;
        background: rgba(0,0,0,0.6);
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">doodle_fight</div>
      </div>
    </div>
    <div id="firebase-login">
      <button id="firebase-login-btn" type="button">Sign in with Google</button>
      <div id="firebase-user" style="display:none;"></div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/doodle_run.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/doodle_run.data.unityweb",
        frameworkUrl: buildUrl + "/doodle_run.framework.js.unityweb",
        codeUrl: buildUrl + "/doodle_run.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Doodle_Run",
        productName: "doodle_fight",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      var unityInstance = null;

      function initFirebaseAuth() {
        if (typeof firebase === 'undefined') return;
        if (window._firebaseInit) return;
        window._firebaseInit = true;

        var firebaseConfig = {
          apiKey: "AIzaSyBeDLV96M5sVq26nMOikoG2ioa6zpigSjg",
          authDomain: "mashroom-75719.firebaseapp.com",
          projectId: "mashroom-75719",
          storageBucket: "mashroom-75719.firebasestorage.app",
          messagingSenderId: "948596753293",
          appId: "1:948596753293:web:a04532d72f1b02403bf3c4",
          measurementId: "G-REW0T5V325"
        };

        firebase.initializeApp(firebaseConfig);

        var auth = firebase.auth();
        var provider = new firebase.auth.GoogleAuthProvider();

        function setUserUI(user) {
          var userEl = document.getElementById("firebase-user");
          var btnEl = document.getElementById("firebase-login-btn");
          if (!userEl || !btnEl) return;
          if (user) {
            userEl.style.display = "block";
            userEl.textContent = user.displayName || user.email || "Signed in";
            btnEl.textContent = "Signed in";
            btnEl.disabled = true;
          } else {
            userEl.style.display = "none";
            btnEl.textContent = "Sign in with Google";
            btnEl.disabled = false;
          }
        }

        function sendUserToUnity(user) {
          var data = {
            uid: user.uid,
            displayName: user.displayName || "",
            email: user.email || "",
            photoURL: user.photoURL || ""
          };
          if (unityInstance) {
            unityInstance.SendMessage("UGSManager", "OnFirebaseUser", JSON.stringify(data));
          } else {
            window._pendingFirebaseUser = data;
          }
        }

        function signIn() {
          auth.signInWithPopup(provider).catch(function(err) {
            // Popup can be blocked in some environments; fallback to redirect.
            auth.signInWithRedirect(provider).catch(function(e2) {
              console.warn("Firebase sign-in failed:", err || e2);
            });
          });
        }

        var loginBtn = document.getElementById("firebase-login-btn");
        if (loginBtn) {
          loginBtn.addEventListener("click", signIn);
        }

        auth.onAuthStateChanged(function(user) {
          setUserUI(user);
          if (user) {
            sendUserToUnity(user);
          }
        });
      }

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };
                // Ensure UGS sign-in runs once after Unity boots.
                try {
                  unityInstance.SendMessage("UGSManager", "InitializeAndSignInAsync");
                } catch (e) {}
                initFirebaseAuth();
                if (window._pendingFirebaseUser) {
                  unityInstance.SendMessage("UGSManager", "OnFirebaseUser", JSON.stringify(window._pendingFirebaseUser));
                  window._pendingFirebaseUser = null;
                }

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
